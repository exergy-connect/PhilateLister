# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # Rebuild Pages only when the dashboard HTML changes (manual runs still deploy full site).
  push:
    branches: ["main"]
    paths:
      - "public/index.html"
      - "public/consolidated_data.js"
      - "public/test/**"
      - "public/listings/**"
      - "public/aps/index.html"
      - "public/psag/*"

  # Pushes from xFrame consolidate use GITHUB_TOKEN and do not fire `push` workflows; redeploy when consolidate finishes.
  workflow_run:
    workflows: ["xFrame consolidate"]
    types: [completed]
    branches: [main]

  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && 'main' || github.ref }}
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./public
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
