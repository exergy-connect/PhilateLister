<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="copyright" content="Copyright (C) 2026 Exergy ∞ LLC" />
    <title>Stamp submission form</title>
    <style>
      :root {
        --bg: #f7f4ee;
        --surface: #fffdf8;
        --ink: #1c1b18;
        --muted: #5c5852;
        --accent: #2d4a3e;
        --accent-hover: #1f342b;
        --border: #d9d3c7;
        --radius: 10px;
        --stamp-slot: #0a0a0a;
        font-family: "Georgia", "Times New Roman", serif;
        /* Larger type for low vision (WCAG-friendly targets) */
        --fs-h1: clamp(1.35rem, 2.25vw, 1.75rem);
        --fs-lead: 1.05rem;
        --fs-legend: 0.9rem;
        --fs-label: 1.02rem;
        --fs-hint: 0.92rem;
        --fs-input: 1.12rem;
        --fs-ui: 1.06rem;
        --fs-footer: 0.92rem;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        line-height: 1.55;
      }
      .wrap {
        width: 100%;
        max-width: min(100%, 118rem);
        margin: 0 auto;
        padding: clamp(0.75rem, 2vw, 1.5rem) clamp(0.75rem, 2.5vw, 2rem) 2rem;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        margin-bottom: clamp(0.75rem, 1.5vw, 1.25rem);
        border-bottom: 1px solid var(--border);
        padding-bottom: 0.65rem;
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        justify-content: space-between;
        gap: 0.35rem 1.5rem;
      }
      header h1 {
        margin: 0;
        font-size: var(--fs-h1);
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      header p {
        margin: 0;
        font-size: var(--fs-lead);
        color: var(--muted);
        flex: 1 1 12rem;
        min-width: min(100%, 28rem);
      }
      header p a {
        color: var(--accent);
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      header p a:hover {
        color: var(--accent-hover);
      }
      .layout {
        display: grid;
        grid-template-columns: minmax(0, min(38vw, 28rem)) minmax(0, 1fr);
        gap: clamp(1rem, 2vw, 1.75rem);
        align-items: start;
      }
      @media (min-width: 1400px) {
        .layout {
          grid-template-columns: minmax(0, 32rem) minmax(0, 1fr);
        }
      }
      @media (max-width: 880px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
      .stamp-column {
        position: sticky;
        top: clamp(0.5rem, 2vw, 1rem);
        align-self: start;
      }
      @media (max-width: 880px) {
        .stamp-column {
          position: static;
        }
      }
      .stamp-slot {
        background: var(--stamp-slot);
        border-radius: var(--radius);
        aspect-ratio: 506 / 306;
        width: 100%;
        max-height: min(58vh, 520px);
        min-height: 12rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 1rem;
        border: 1px solid #222;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
      }
      .stamp-slot img {
        max-width: 100%;
        max-height: calc(100% - 3rem);
        width: auto;
        height: auto;
        object-fit: contain;
        display: none;
      }
      .stamp-slot.has-image img {
        display: block;
      }
      .stamp-slot.has-image .stamp-placeholder-text {
        display: none;
      }
      .stamp-placeholder-text {
        color: #8a8a8a;
        font-size: var(--fs-lead);
        text-align: center;
        max-width: 12rem;
      }
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      button.upload-btn {
        font-family: inherit;
        font-size: var(--fs-ui);
        padding: 0.55rem 1.15rem;
        border-radius: 6px;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #f5f2eb;
        cursor: pointer;
      }
      button.upload-btn:hover {
        background: var(--accent-hover);
        border-color: var(--accent-hover);
      }
      button.upload-btn:focus-visible {
        outline: 3px solid var(--accent);
        outline-offset: 2px;
      }
      .form-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: clamp(0.85rem, 1.5vw, 1.2rem) clamp(0.9rem, 1.8vw, 1.35rem);
        box-shadow: 0 1px 2px rgba(28, 27, 24, 0.06);
        display: flex;
        flex-direction: column;
        gap: clamp(0.75rem, 1.5vw, 1.1rem);
        min-width: 0;
      }
      .grid-2 {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.5rem 1rem;
        align-items: start;
      }
      @media (max-width: 520px) {
        .grid-2 {
          grid-template-columns: 1fr;
        }
      }
      .field-group {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .field-group input[type="text"],
      .field-group textarea {
        margin-bottom: 0;
      }
      /* Same two columns as .grid-2 so description aligns with Country / Other catalogue */
      .mid-split {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.5rem 1rem;
        align-items: start;
      }
      .pricing-row {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: flex-end;
        gap: 0.65rem 1.25rem;
      }
      .pricing-row .field-group {
        flex: 0 1 auto;
      }
      @media (max-width: 520px) {
        .mid-split {
          grid-template-columns: 1fr;
        }
      }
      .cond-stack {
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
        min-width: 0;
      }
      .cond-stack fieldset {
        margin: 0;
      }
      fieldset {
        border: none;
        margin: 0;
        padding: 0;
        min-width: 0;
      }
      legend {
        font-size: var(--fs-legend);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin-bottom: 0.5rem;
        padding: 0;
      }
      label.field {
        display: block;
        font-size: var(--fs-label);
        font-weight: 600;
        margin-bottom: 0.28rem;
        color: var(--ink);
      }
      .hint {
        font-size: var(--fs-hint);
        font-weight: 400;
        color: var(--muted);
      }
      input[type="text"],
      textarea {
        width: 100%;
        font-family: inherit;
        font-size: var(--fs-input);
        padding: 0.55rem 0.65rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        margin-bottom: 0;
      }
      /* Catalog / sale: room for amounts like 99999.99 (content-box: padding outside ch) */
      .field-group input[type="text"].input-price {
        width: 9ch;
        min-width: 9ch;
        max-width: 100%;
        box-sizing: content-box;
        font-variant-numeric: tabular-nums;
        text-align: right;
      }
      .field-group input[type="text"].input-percent {
        width: 4ch;
        min-width: 4ch;
        max-width: 100%;
        box-sizing: content-box;
        font-variant-numeric: tabular-nums;
        text-align: center;
      }
      .field-group.field-group-center {
        align-items: center;
      }
      .field-group.field-group-center .field {
        text-align: center;
        width: 100%;
      }
      input[type="text"]:focus,
      textarea:focus {
        outline: 3px solid rgba(45, 74, 62, 0.45);
        outline-offset: 2px;
        border-color: var(--accent);
      }
      textarea {
        min-height: 7.25rem;
        resize: vertical;
        line-height: 1.55;
      }
      .radio-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(7.5rem, 1fr));
        gap: 0.4rem 0.75rem;
        margin: 0;
      }
      .radio-grid.compact-cols {
        grid-template-columns: repeat(auto-fill, minmax(6.25rem, 1fr));
      }
      .radio-grid label.choice {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        font-weight: 400;
        font-size: var(--fs-ui);
        margin-bottom: 0;
        cursor: pointer;
      }
      .radio-grid input {
        accent-color: var(--accent);
        width: 1.15em;
        height: 1.15em;
        flex-shrink: 0;
      }
      .actions {
        margin-top: 0;
        padding-top: 0.75rem;
        border-top: 1px solid var(--border);
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
      }
      .actions button.secondary {
        background: transparent;
        color: var(--accent);
        border: 1px solid var(--border);
      }
      .actions button.secondary:hover {
        border-color: var(--accent);
        background: rgba(45, 74, 62, 0.06);
      }
      .site-footer {
        margin-top: auto;
        padding-top: 0.65rem;
        border-top: 1px solid var(--border);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: baseline;
        gap: 0.35rem 0.75rem;
        font-size: var(--fs-footer);
        color: var(--muted);
      }
      .site-footer .footer-copy {
        grid-column: 2;
        text-align: center;
        justify-self: center;
      }
      .site-footer .footer-version {
        grid-column: 3;
        justify-self: end;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }
      @media print {
        body {
          background: #fff;
        }
        .actions,
        #stamp-upload-btn {
          display: none !important;
        }
        .wrap {
          max-width: none;
          padding: 0;
          min-height: auto;
        }
        .layout {
          grid-template-columns: 14rem 1fr;
          gap: 1rem;
        }
        .mid-split {
          grid-template-columns: 1fr 1fr;
        }
        .form-panel {
          box-shadow: none;
        }
        .stamp-slot {
          max-height: 220px;
        }
        .site-footer {
          border-top-color: #ccc;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Stamp submission form</h1>
        <p>
          Mirrors the official
          <a
            href="https://stamps.org/Portals/0/StampStore/Submission%20Form-Stamps%20Fillable.pdf"
            rel="noopener noreferrer"
            >APS StampStore Submission Form</a
          >.
        </p>
      </header>

      <form class="layout" id="aps-form" action="#" method="post" autocomplete="on" onsubmit="return false;">
        <div class="stamp-column">
          <div class="stamp-slot" id="stamp-slot" aria-label="Stamp image preview area">
            <span class="stamp-placeholder-text">No image yet. Upload a scan or photo of the stamp(s).</span>
            <img id="stamp-preview" alt="Stamp preview" />
            <input
              class="visually-hidden"
              type="file"
              id="stamp-file"
              name="stamp_image"
              accept="image/*"
            />
            <button type="button" class="upload-btn" id="stamp-upload-btn">Upload stamp image</button>
          </div>
        </div>

        <div class="form-panel">
          <fieldset>
            <legend>Identification</legend>
            <div class="grid-2">
              <div class="field-group">
                <label class="field" for="country">Country</label>
                <input type="text" id="country" name="country" placeholder="e.g. Sweden, United States" />
              </div>
              <div class="field-group">
                <label class="field" for="scott_cat">Scott Cat. #</label>
                <input type="text" id="scott_cat" name="scott_cat" placeholder="e.g. O6, 156" />
              </div>
              <div class="field-group">
                <label class="field" for="other_catalog">Other catalogue</label>
                <input
                  type="text"
                  id="other_catalog"
                  name="other_catalog"
                  placeholder="Michel, Facit, Yvert…"
                />
              </div>
              <div class="field-group">
                <label class="field" for="seller_sku">
                  Seller item no. <span class="hint">(optional)</span>
                </label>
                <input type="text" id="seller_sku" name="seller_sku" placeholder="Internal SKU" />
              </div>
            </div>
          </fieldset>

          <div class="grid-2">
            <fieldset>
              <legend>Pricing <span class="hint">(USD)</span></legend>
              <div class="pricing-row">
                <div class="field-group">
                  <label class="field" for="catalog_value">Catalog value</label>
                  <input
                    type="text"
                    id="catalog_value"
                    name="catalog_value"
                    class="input-price"
                    inputmode="decimal"
                    autocomplete="off"
                    placeholder="125.00"
                  />
                </div>
                <div class="field-group">
                  <label class="field" for="sale_price">Sale price</label>
                  <input
                    type="text"
                    id="sale_price"
                    name="sale_price"
                    class="input-price"
                    inputmode="decimal"
                    autocomplete="off"
                    placeholder="44.00"
                  />
                </div>
                <div class="field-group field-group-center">
                  <label class="field" for="sale_percent"
                    >% of catalog <span class="hint">(sale)</span></label
                  >
                  <input
                    type="text"
                    id="sale_percent"
                    name="sale_percent"
                    class="input-percent"
                    inputmode="decimal"
                    autocomplete="off"
                    value="40"
                    placeholder="40"
                  />
                </div>
              </div>
            </fieldset>

            <div class="cond-stack">
              <fieldset>
                <legend>Unused / used</legend>
                <div class="radio-grid compact-cols" role="radiogroup" aria-label="Unused or used">
                  <label class="choice"
                    ><input type="radio" name="condition_used" value="unused" /> Unused</label
                  >
                  <label class="choice"
                    ><input type="radio" name="condition_used" value="used" checked /> Used</label
                  >
                </div>
              </fieldset>

              <fieldset id="gum-fieldset">
                <legend>Gum <span class="hint">(if unused)</span></legend>
                <div class="radio-grid compact-cols" role="radiogroup" aria-label="Gum state">
                  <label class="choice"><input type="radio" name="gum" value="nh" /> NH</label>
                  <label class="choice"><input type="radio" name="gum" value="h" /> H</label>
                  <label class="choice"><input type="radio" name="gum" value="lh" /> LH</label>
                  <label class="choice"><input type="radio" name="gum" value="hh" /> HH</label>
                  <label class="choice"><input type="radio" name="gum" value="hr" /> HR</label>
                  <label class="choice"><input type="radio" name="gum" value="ng" /> NG</label>
                </div>
              </fieldset>
            </div>
          </div>

          <div class="mid-split">
            <fieldset>
              <legend>Description</legend>
              <div class="field-group">
                <label class="field" for="description"
                  >Description <span class="hint">(~4 lines)</span></label
                >
                <textarea
                  id="description"
                  name="description"
                  rows="4"
                  placeholder="Title, summary, catalogue notes, HipStamp text…"
                ></textarea>
              </div>
            </fieldset>

            <fieldset>
              <legend>Configuration</legend>
              <div class="radio-grid" role="radiogroup" aria-label="Lot configuration">
                <label class="choice"
                  ><input type="radio" name="configuration" value="single" checked /> Single</label
                >
                <label class="choice"><input type="radio" name="configuration" value="multiple" /> Multiple</label>
                <label class="choice"><input type="radio" name="configuration" value="set" /> Complete Set</label>
                <label class="choice"><input type="radio" name="configuration" value="plate_block" /> Plate block</label>
                <label class="choice"
                  ><input type="radio" name="configuration" value="souvenir_sheet" /> Souvenir sheet</label
                >
                <label class="choice"
                  ><input type="radio" name="configuration" value="cinderella" /> Cinderella</label
                >
                <label class="choice"
                  ><input type="radio" name="configuration" value="pnc" /> Plate number coil</label
                >
              </div>
            </fieldset>
          </div>

          <div class="actions">
            <button type="button" class="upload-btn" id="pdf-btn">Download PDF</button>
            <button type="reset" class="upload-btn secondary" id="reset-btn">Reset form</button>
          </div>
        </div>
      </form>

      <footer class="site-footer">
        <span class="footer-copy">Copyright (C) 2026 Exergy ∞ LLC</span>
        <time class="footer-version" datetime="2026-04-14">2026-04-14</time>
      </footer>
    </div>

    <script type="module">
      import { PDFDocument, StandardFonts, TextAlignment } from "https://esm.sh/pdf-lib@1.17.1";

      /** Official AcroForm (same directory as this page) */
      const TEMPLATE_PATH = "Submission%20Form-Stamps%20Fillable.pdf";

      /** Black stamp area on template (PDF coords: origin bottom-left), matches fill_submission_form.py / PyMuPDF measure */
      const STAMP_SLOT = { left: 83.7, topFromTop: 79, right: 590, bottomFromTop: 385 };

      const $ = (id) => document.getElementById(id);
      const val = (id) => {
        const el = $(id);
        return el ? String(el.value || "").trim() : "";
      };

      function safeSetText(form, fieldName, text) {
        if (!text) return;
        try {
          form.getTextField(fieldName).setText(text);
        } catch (err) {
          console.warn("Text field", fieldName, err);
        }
      }

      /** Catalog / sale amount boxes on the APS template (dollars + cents). */
      const PDF_PRICE_FIELD_NAMES = ["undefined_4", "undefined_5", "undefined_9", "undefined_10"];

      function alignPdfPriceFieldsRight(form) {
        for (const name of PDF_PRICE_FIELD_NAMES) {
          try {
            form.getTextField(name).setAlignment(TextAlignment.Right);
          } catch (err) {
            console.warn("PDF field alignment", name, err);
          }
        }
      }

      /** Split long description across Description 1–3 like fill_submission_form.split_description */
      function splitDescriptionThree(block, maxLen) {
        const combined = String(block || "").trim();
        if (!combined) return ["", "", ""];
        if (combined.length <= maxLen) return [combined, "", ""];
        const parts = ["", "", ""];
        let remaining = combined;
        for (let i = 0; i < 3 && remaining; i++) {
          parts[i] = remaining.slice(0, maxLen);
          remaining = remaining.slice(maxLen).trimStart();
        }
        return parts;
      }

      /**
       * Template uses paired text fields: whole dollars (e.g. undefined_4) and cents (undefined_5).
       * @returns {{ dollars: string, cents: string } | null}
       */
      function splitUsdForPdf(amountStr) {
        let s = String(amountStr || "")
          .trim()
          .replace(/^\$/, "")
          .replace(/,/g, "");
        if (!s) return null;
        if (!/^\d*\.?\d*$/.test(s)) return null;
        const [intPart, fracRaw = ""] = s.split(".");
        const dollars =
          intPart === "" ? "0" : intPart.replace(/^0+(?=\d)/, "") || "0";
        let frac = fracRaw.replace(/\D/g, "");
        if (frac.length >= 2) frac = frac.slice(0, 2);
        else if (frac.length === 1) frac = frac + "0";
        else frac = "00";
        return { dollars, cents: frac };
      }

      const CONFIGURATION_TO_PDF = {
        single: "Single",
        multiple: "Multiple",
        set: "Set",
        plate_block: "Plate Block",
        souvenir_sheet: "Souvenir Sheet",
        cinderella: "Cincerella",
        pnc: "Choice1",
      };

      const GUM_TO_PDF = { nh: "NH", h: "H", lh: "LH", hh: "HH", hr: "HR", ng: "NG" };

      const fileInput = $("stamp-file");
      const uploadBtn = $("stamp-upload-btn");
      const slot = $("stamp-slot");
      const preview = $("stamp-preview");
      const resetBtn = $("reset-btn");
      const pdfBtn = $("pdf-btn");
      const gumFieldset = $("gum-fieldset");
      const usedRadios = document.querySelectorAll('input[name="condition_used"]');

      uploadBtn.addEventListener("click", () => fileInput.click());

      fileInput.addEventListener("change", () => {
        const f = fileInput.files && fileInput.files[0];
        if (!f || !f.type.startsWith("image/")) return;
        const url = URL.createObjectURL(f);
        if (preview.dataset.objectUrl) URL.revokeObjectURL(preview.dataset.objectUrl);
        preview.dataset.objectUrl = url;
        preview.src = url;
        slot.classList.add("has-image");
      });

      resetBtn.addEventListener("click", () => {
        if (preview.dataset.objectUrl) {
          URL.revokeObjectURL(preview.dataset.objectUrl);
          delete preview.dataset.objectUrl;
        }
        preview.removeAttribute("src");
        slot.classList.remove("has-image");
      });

      function syncGumDisabled() {
        const used =
          document.querySelector('input[name="condition_used"]:checked') &&
          document.querySelector('input[name="condition_used"]:checked').value === "used";
        gumFieldset.style.opacity = used ? "0.45" : "1";
        gumFieldset.querySelectorAll('input[name="gum"]').forEach((el) => {
          el.disabled = used;
          if (used) el.checked = false;
        });
      }

      usedRadios.forEach((r) => r.addEventListener("change", syncGumDisabled));
      syncGumDisabled();

      function parseUsdAmount(str) {
        const t = String(str || "")
          .trim()
          .replace(/^\$/, "")
          .replace(/,/g, "");
        if (!t || !/^\d*\.?\d*$/.test(t)) return null;
        const n = Number(t);
        return Number.isFinite(n) && n >= 0 ? n : null;
      }

      function formatSaleFromCatalog(catalogNum, pctNum) {
        const sale = (catalogNum * pctNum) / 100;
        const rounded = Math.round(sale * 100) / 100;
        return rounded.toFixed(2);
      }

      /** Format a valid USD-ish string to exactly two decimal places, or null if invalid. */
      function formatUsdTwoDecimalsStr(str) {
        const n = parseUsdAmount(str);
        return n != null ? n.toFixed(2) : null;
      }

      function normalizeUsdFieldsTwoDecimals(ids) {
        for (const id of ids) {
          const el = $(id);
          if (!el) continue;
          const f = formatUsdTwoDecimalsStr(el.value);
          if (f != null) el.value = f;
        }
      }

      function syncSaleFromCatalogPercent() {
        const saleEl = $("sale_price");
        const cat = parseUsdAmount(val("catalog_value"));
        const pctStr = val("sale_percent").replace(/%/g, "").trim();
        if (cat == null || pctStr === "") return;
        const pct = Number(pctStr);
        if (!Number.isFinite(pct) || pct < 0) return;
        saleEl.value = formatSaleFromCatalog(cat, pct);
      }

      const catalogInput = $("catalog_value");
      const salePercentInput = $("sale_percent");
      for (const evt of ["input", "change"]) {
        catalogInput?.addEventListener(evt, syncSaleFromCatalogPercent);
        salePercentInput?.addEventListener(evt, syncSaleFromCatalogPercent);
      }

      function attachUsdTwoDecimalBlur(el) {
        if (!el) return;
        el.addEventListener("blur", () => {
          const formatted = formatUsdTwoDecimalsStr(el.value);
          if (formatted != null) {
            el.value = formatted;
            if (el.id === "catalog_value") syncSaleFromCatalogPercent();
          }
        });
      }
      attachUsdTwoDecimalBlur(catalogInput);
      attachUsdTwoDecimalBlur($("sale_price"));

      pdfBtn.addEventListener("click", async () => {
        const condUsed = document.querySelector('input[name="condition_used"]:checked');
        if (condUsed && condUsed.value === "unused") {
          if (!document.querySelector('input[name="gum"]:checked')) {
            alert("Please select a gum quality before downloading the PDF.");
            gumFieldset.scrollIntoView({ behavior: "smooth", block: "nearest" });
            gumFieldset.querySelector('input[name="gum"]')?.focus();
            return;
          }
        }

        pdfBtn.disabled = true;
        const prevText = pdfBtn.textContent;
        pdfBtn.textContent = "Building…";
        try {
          normalizeUsdFieldsTwoDecimals(["catalog_value", "sale_price"]);

          const templateUrl = new URL(TEMPLATE_PATH, window.location.href);
          const res = await fetch(templateUrl.href);
          if (!res.ok) {
            throw new Error(
              "Missing template PDF (" +
                TEMPLATE_PATH +
                "). Serve the site over HTTP from the PhilateLister repo root (not file://), with aps/ deployed as in the repository."
            );
          }
          const tmplBytes = await res.arrayBuffer();
          const pdfDoc = await PDFDocument.load(tmplBytes);
          const form = pdfDoc.getForm();
          const helvetica = await pdfDoc.embedFont(StandardFonts.Helvetica);
          alignPdfPriceFieldsRight(form);

          safeSetText(form, "Country", val("country"));
          safeSetText(form, "Scott Cat", val("scott_cat"));
          safeSetText(form, "Other Catalogue Name", val("other_catalog"));
          safeSetText(
            form,
            "Seller Item No sellers use only not published",
            val("seller_sku")
          );

          const [d1, d2, d3] = splitDescriptionThree(val("description"), 900);
          safeSetText(form, "Description 1", d1);
          safeSetText(form, "Description 2", d2);
          safeSetText(form, "Description 3", d3);

          const catParts = splitUsdForPdf(val("catalog_value"));
          if (catParts) {
            safeSetText(form, "undefined_4", catParts.dollars);
            safeSetText(form, "undefined_5", catParts.cents);
          }
          const saleParts = splitUsdForPdf(val("sale_price"));
          if (saleParts) {
            safeSetText(form, "undefined_9", saleParts.dollars);
            safeSetText(form, "undefined_10", saleParts.cents);
          }

          const usedEl = document.querySelector('input[name="condition_used"]:checked');
          const isUsed = usedEl && usedEl.value === "used";
          try {
            form.getRadioGroup("Condition 1").select(isUsed ? "Used" : "Unused");
          } catch (err) {
            console.warn("Condition 1", err);
          }

          try {
            const gumEl = document.querySelector('input[name="gum"]:checked');
            const gumPdf = gumEl && GUM_TO_PDF[gumEl.value];
            if (!isUsed && gumPdf) {
              form.getRadioGroup("Condition").select(gumPdf);
            } else {
              form.getRadioGroup("Condition").clear();
            }
          } catch (err) {
            console.warn("Condition", err);
          }

          try {
            const cfgEl = document.querySelector('input[name="configuration"]:checked');
            const opt = cfgEl && CONFIGURATION_TO_PDF[cfgEl.value];
            if (opt) form.getRadioGroup("Configuration").select(opt);
          } catch (err) {
            console.warn("Configuration", err);
          }

          form.updateFieldAppearances(helvetica);

          const pageH = 792;
          const slotW = STAMP_SLOT.right - STAMP_SLOT.left;
          const slotH = STAMP_SLOT.bottomFromTop - STAMP_SLOT.topFromTop;
          const slotBottomY = pageH - STAMP_SLOT.bottomFromTop;

          if (preview.src && preview.src.startsWith("blob:")) {
            try {
              const bytes = await fetch(preview.src).then((r) => r.arrayBuffer());
              let emb = null;
              try {
                emb = await pdfDoc.embedPng(bytes);
              } catch {
                emb = await pdfDoc.embedJpg(bytes);
              }
              if (emb) {
                const iw = emb.width;
                const ih = emb.height;
                const scale = Math.min(slotW / iw, slotH / ih);
                const dw = iw * scale;
                const dh = ih * scale;
                const ix = STAMP_SLOT.left + (slotW - dw) / 2;
                const iy = slotBottomY + (slotH - dh) / 2;
                const [page] = pdfDoc.getPages();
                page.drawImage(emb, { x: ix, y: iy, width: dw, height: dh });
              }
            } catch (_) {
              /* unsupported image type */
            }
          }

          const out = await pdfDoc.save();
          const blob = new Blob([out], { type: "application/pdf" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "stamp-submission.pdf";
          a.rel = "noopener";
          a.click();
          URL.revokeObjectURL(url);
        } catch (err) {
          console.error(err);
          alert(
            "Could not build PDF.\n\n" +
              (err && err.message ? err.message + "\n\n" : "") +
              "You need pdf-lib from esm.sh (network) and Submission Form-Stamps Fillable.pdf beside this page."
          );
        } finally {
          pdfBtn.disabled = false;
          pdfBtn.textContent = prevText;
        }
      });
    </script>
  </body>
</html>
