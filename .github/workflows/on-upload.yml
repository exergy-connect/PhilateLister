# Runs when the dashboard (or any client) adds files under uploads/ via the GitHub API.
name: Stamp upload

on:
  push:
    branches:
      - stamp-data
    paths:
      - "uploads/**"

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 2

      - name: Show commit message (metadata from index.html)
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          printf '%s\n' "$COMMIT_MESSAGE" | head -n 12

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Gemini appraisal on new images
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMITS_JSON: ${{ toJson(github.event.commits) }}
          HEAD_COMMIT_JSON: ${{ toJson(github.event.head_commit) }}
        run: |
          if [ -z "${GEMINI_API_KEY}" ]; then
            echo "Skipping appraisal: add repository secret GEMINI_API_KEY."
            exit 0
          fi
          set -euo pipefail
          # Resolve image paths: push payload, then PhilateLister commit message, then git.
          mapfile -t files < <(python3 <<'PY'
          import json, os, re

          commits = json.loads(os.environ.get("COMMITS_JSON", "[]") or "[]")
          paths: list[str] = []
          for c in commits:
              paths.extend(c.get("added") or [])
              paths.extend(c.get("modified") or [])
          if not paths:
              hc = json.loads(os.environ.get("HEAD_COMMIT_JSON", "null") or "null")
              if isinstance(hc, dict):
                  paths.extend(hc.get("added") or [])
                  paths.extend(hc.get("modified") or [])

          def from_commit_message(msg: str) -> list[str]:
              out: list[str] = []
              msg = (msg or "").strip()
              if not msg:
                  return out
              first = msg.split("\n", 1)[0].strip()
              m = re.match(r"PhilateLister upload:\s*(.+)$", first)
              if m:
                  name = m.group(1).strip()
                  if name:
                      out.append(
                          name if name.startswith("uploads/") else f"uploads/{name}"
                      )
              if "\n\n" in msg:
                  try:
                      meta = json.loads(msg.split("\n\n", 1)[1].strip())
                      f = meta.get("file")
                      if isinstance(f, str) and f.strip():
                          f = f.strip()
                          cand = f if f.startswith("uploads/") else f"uploads/{f}"
                          if cand not in out:
                              out.append(cand)
                  except json.JSONDecodeError:
                      pass
              return out

          if not paths:
              paths.extend(from_commit_message(os.environ.get("COMMIT_MESSAGE", "")))

          pat = re.compile(r"^uploads/.*\.(jpe?g|png|webp|gif)$", re.I)
          seen: set[str] = set()
          for p in paths:
              if p and pat.match(p) and p not in seen:
                  seen.add(p)
                  print(p)
          PY
          )
          if [ "${#files[@]}" -eq 0 ]; then
            mapfile -t files < <(git show --pretty=format: --name-only "${GITHUB_SHA}" 2>/dev/null | grep -iE '^uploads/.*\.(jpe?g|png|webp|gif)$' || true)
          fi
          if [ "${#files[@]}" -eq 0 ]; then
            mapfile -t files < <(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -iE '^uploads/.*\.(jpe?g|png|webp|gif)$' || true)
          fi
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No image files in this commit under uploads/."
            exit 0
          fi
          echo "Appraising: ${files[*]}"
          for f in "${files[@]}"; do
            if [ -f "$f" ]; then
              python scripts/appraisal.py "$f"
            fi
          done

      - name: Commit listings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add listings/
          if git diff --staged --quiet; then
            echo "No listing files to commit."
          else
            git commit -m "listings: Gemini text for latest upload(s)"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
