<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PhilateLister Plugin Options</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        margin: 24px;
        color: #111;
      }
      .wrap {
        max-width: 560px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.3rem;
      }
      p {
        margin: 0 0 14px;
        line-height: 1.4;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
      }
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        font: inherit;
        padding: 8px 10px;
      }
      .row {
        display: flex;
        gap: 10px;
        margin-top: 12px;
        align-items: center;
      }
      button {
        font: inherit;
        padding: 8px 12px;
        cursor: pointer;
      }
      #status {
        min-height: 1.2em;
        font-size: 0.95rem;
      }
      #status.ok {
        color: #0a6b2e;
      }
      #status.error {
        color: #a11;
      }
      code {
        background: #f3f4f6;
        padding: 1px 4px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>PhilateLister Plugin Options</h1>
      <p>Configure the query parameter used for AI analysis launches.</p>
      <label for="ai-token-password">AI token password (<code>token_password</code>)</label>
      <input id="ai-token-password" type="text" autocomplete="off" spellcheck="false" />
      <div class="row">
        <button id="save-btn" type="button">Save</button>
        <span id="status" aria-live="polite"></span>
      </div>
    </div>
    <script src="./options.js"></script>
  </body>
  </html>
