# Runs when the dashboard (or any client) adds files under uploads/ via the GitHub API.
name: Stamp upload

on:
  push:
    branches:
      - main
    paths:
      - "uploads/**"

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Show commit message (metadata from index.html)
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          printf '%s\n' "$COMMIT_MESSAGE" | head -n 12

      # dist/appraisal.cjs is the esbuild bundle (committed by scripts-build); no npm install here.
      - name: Move upload to public/listings/images (content hash) and run appraisal
        env:
          NODE_DEBUG: appraisal
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_HTTP_REFERER: ${{ vars.OPENROUTER_HTTP_REFERER }}
          OPENROUTER_TITLE: ${{ vars.OPENROUTER_TITLE }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          first=$(printf '%s\n' "${COMMIT_MESSAGE:-}" | head -n 1 | tr -d '\r')
          name=$(printf '%s\n' "$first" | sed -n 's/^PhilateLister upload:[[:space:]]*\(.*\)$/\1/p' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "$name" ]; then
            echo "No image path in commit message (expected first line: PhilateLister upload: <file>)."
            exit 0
          fi
          case "$name" in
            uploads/*) f="$name" ;;
            *) f="uploads/$name" ;;
          esac
          if ! printf '%s\n' "$f" | grep -qiE '^uploads/.+\.(jpe?g|png|webp|gif)$'; then
            echo "Commit message path is not under uploads/ with a supported image extension."
            exit 0
          fi
          if [ ! -f "$f" ]; then
            echo "Commit message names $f but that file is missing in the tree."
            exit 1
          fi

          mkdir -p public/listings/images
          base=$(basename "$f")
          ext="${base##*.}"
          ext=$(printf '%s\n' "$ext" | tr 'A-Z' 'a-z')
          hash=$(sha256sum "$f" | awk '{print $1}')
          dest="public/listings/images/${hash}.${ext}"
          mv "$f" "$dest"
          echo "Moved upload to $dest (sha256=$hash)"

          if [ -z "${GEMINI_API_KEY:-}" ] && [ -z "${OPENROUTER_API_KEY:-}" ]; then
            echo "Skipping appraisal: add repository secret GEMINI_API_KEY and/or OPENROUTER_API_KEY."
            exit 0
          fi
          listing_stem="${base%.*}"
          echo "Appraising: $dest (listing basename: $listing_stem)"
          node scripts/dist/appraisal.cjs "$dest" --listing-basename "$listing_stem"

      - name: Stage listings under public/
        run: |
          mkdir -p public/listings
          if [ -d listings ]; then
            find listings -type f -print0 | while IFS= read -r -d '' f; do
              mv "$f" "public/listings/$(basename "$f")"
            done
            rmdir listings 2>/dev/null || true
          fi

      - name: Commit listings, images, upload removals, and invocation stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/listings/
          git add -u uploads/
          git add xframe/data/invocation_stats.json
          git add xframe/data/events/
          if git diff --staged --quiet; then
            echo "No listing, image ingest, invocation_stats, or per-invocation event changes to commit."
          else
            git commit -m "listings: stamp outputs; invocation telemetry (stats + events)"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
